<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <style>
    text { font-family: 'SF Mono', 'Menlo', 'Consolas', monospace; }
    .bg { fill: #0a0a1a; }
    .border { fill: none; stroke: rgba(124,58,237,0.15); stroke-width: 1; }
    .header { fill: #0d0d1f; }

    /* Typing: each letter revealed via clip-path width animation */
    /* "how did we fix the auth bug?" = 28 chars, ~8.4px each at 14px font */
    /* Total typing time: 1.4s (0.05s per char), starts at 0.3s */

    .chevron { fill: #6b7280; font-size: 14px; font-weight: 700; }
    .input { fill: #f1f5f9; font-size: 14px; font-weight: 700; }

    /* Typing reveal mask */
    .typing-mask { animation: typing 1.4s steps(28) 0.3s forwards; }
    @keyframes typing { from { width: 0; } to { width: 240px; } }

    /* Cursor: blinks during typing, moves right, then disappears */
    .cursor {
      fill: #f1f5f9;
      animation:
        cursor-move 1.4s steps(28) 0.3s forwards,
        blink 0.6s step-end infinite,
        cursor-hide 0.1s 1.7s forwards;
    }
    @keyframes cursor-move { from { x: 48; } to { x: 288; } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes cursor-hide { to { opacity: 0; } }

    /* Lines appear after typing is done (1.7s) */
    .line { opacity: 0; }
    .l2 { animation: appear 0.2s 2.0s forwards; }
    .l3 { animation: appear 0.2s 2.3s forwards; }
    .l4 { animation: appear 0.2s 2.5s forwards; }
    .l5 { animation: appear 0.2s 2.7s forwards; }
    .l6 { animation: appear 0.2s 2.9s forwards; }
    .l7 { animation: appear 0.2s 3.1s forwards; }
    .l8 { animation: appear 0.2s 3.3s forwards; }
    .l9 { animation: appear 0.2s 3.5s forwards; }
    .l10 { animation: appear 0.4s 4.0s forwards; }
    @keyframes appear { to { opacity: 1; } }

    .hook-label { fill: #4b5563; font-size: 12px; }
    .hook-text { fill: #6b7280; font-size: 12px; }
    .rag-purple { fill: #8b5cf6; font-size: 12px; }
    .score { fill: #fbbf24; font-size: 12px; font-weight: 700; }
    .result { fill: #94a3b8; font-size: 12px; }
    .tool { fill: #38bdf8; font-size: 12px; }
    .dim { fill: #4b5563; font-size: 12px; }
    .answer { fill: #64748b; font-size: 12px; }
    .bullet { fill: #f59e0b; font-size: 12px; }
    .resp { fill: #e2e8f0; font-size: 13px; }
    .code { fill: #8b5cf6; font-size: 13px; }
    .more { fill: #4b5563; font-size: 12px; }

    /* Full loop */
    .scene { animation: scene-loop 14s infinite; }
    @keyframes scene-loop {
      0%,6% { opacity: 1; }
      88% { opacity: 1; }
      96% { opacity: 0; }
      100% { opacity: 0; }
    }
  </style>

  <!-- Terminal frame -->
  <rect class="bg" width="800" height="420" rx="12"/>
  <rect class="border" x="0.5" y="0.5" width="799" height="419" rx="12"/>
  <rect class="header" width="800" height="40" rx="12"/>
  <rect class="bg" y="28" width="800" height="14"/>
  <circle fill="#ef4444" cx="24" cy="20" r="6"/>
  <circle fill="#eab308" cx="44" cy="20" r="6"/>
  <circle fill="#22c55e" cx="64" cy="20" r="6"/>

  <g class="scene">
    <!-- Chevron (always visible) -->
    <text class="chevron" x="32" y="80">›</text>

    <!-- Typing text with clip mask -->
    <defs>
      <clipPath id="type-clip">
        <rect x="48" y="62" height="24" class="typing-mask" width="0"/>
      </clipPath>
    </defs>
    <text class="input" x="48" y="80" clip-path="url(#type-clip)">how did we fix the auth bug?</text>

    <!-- Blinking cursor that moves with typing then disappears -->
    <rect class="cursor" x="48" y="66" width="8" height="16" rx="1"/>

    <!-- Hook output -->
    <g class="line l2">
      <text class="hook-label" x="40" y="116">└</text>
      <text class="hook-text" x="56" y="116">UserPromptSubmit says:</text>
      <text class="rag-purple" x="228" y="116">🔍 RAG found 3 matches</text>
      <text class="dim" x="430" y="116">(8ms)</text>
    </g>

    <!-- Result 1 -->
    <g class="line l3">
      <text class="result" x="72" y="148">💬</text>
      <text class="score" x="96" y="148">87%</text>
      <text class="result" x="132" y="148">— Q: Fix the authentication bug in login</text>
    </g>
    <g class="line l4">
      <text class="result" x="96" y="172">🔧</text>
      <text class="tool" x="120" y="172">2x Read, 1x Bash</text>
    </g>
    <g class="line l5">
      <text class="result" x="96" y="196">🤖</text>
      <text class="answer" x="120" y="196">A: Changed TOKEN_EXPIRY from 3600 to 86400...</text>
      <text class="dim" x="480" y="196">(247 tokens)</text>
    </g>

    <!-- Result 2 -->
    <g class="line l6">
      <text class="result" x="72" y="228">💬</text>
      <text class="score" x="96" y="228">83%</text>
      <text class="result" x="132" y="228">— Q: Do the auth tests pass?</text>
    </g>
    <g class="line l7">
      <text class="result" x="96" y="252">🤖</text>
      <text class="answer" x="120" y="252">A: 14 passed, 0 failed</text>
      <text class="dim" x="328" y="252">(5 tokens)</text>
    </g>

    <!-- Result 3 + more -->
    <g class="line l8">
      <text class="result" x="72" y="280">🔧</text>
      <text class="score" x="96" y="280">68%</text>
      <text class="dim" x="132" y="280">Read — src/auth/token.ts</text>
    </g>
    <g class="line l9">
      <text class="more" x="72" y="308">... +2 more</text>
    </g>

    <!-- Claude response -->
    <g class="line l10">
      <text class="bullet" x="32" y="360">●</text>
      <text class="resp" x="52" y="360">The auth bug was in <tspan class="code">src/auth/token.ts</tspan>. The <tspan class="code">TOKEN_EXPIRY</tspan> was set to 3600</text>
      <text class="resp" x="52" y="384">seconds (1 hour) instead of 86400 (24 hours). I fixed it and all 14 tests pass now.</text>
    </g>
  </g>
</svg>
